<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Destinos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007BFF; color: white; }
        .table-input { width: 90%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-update { background-color: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .btn-update:hover { background-color: #218838; }
        .btn-delete { background-color: #dc3545; color: white; text-decoration: none; padding: 8px 12px; border-radius: 4px; display: inline-block; font-size: 13.3px; font-family: Arial;}
        .btn-delete:hover { background-color: #c82333; }
        .btn-pdf { background-color: #17a2b8; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .footer-note { margin-top: 30px; text-align: center; font-size: 0.9em; color: #666; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gestión de Destinos Turísticos</h1>

    <div style="text-align: right; margin-bottom: 15px;">
        <a href="/reporte_pdf" class="btn-pdf">Descargar Reporte PDF</a>
        <a href="/logout" class="btn-delete" style="margin-left: 10px;">Cerrar Sesión</a>
    </div>

    <h2>Añadir Nuevo Destino</h2>
    <form action="/insertar" method="POST" style="margin-bottom: 30px; text-align: center;">
        <input type="text" name="nombre_destino" placeholder="Nombre" required class="table-input" style="width: 20%;">
        <input type="text" name="pais" placeholder="País" required class="table-input" style="width: 20%;">
        <input type="number" step="0.01" name="precio" placeholder="Precio" required class="table-input" style="width: 15%;">
        <input type="number" name="cupos" placeholder="Cupos" required class="table-input" style="width: 15%;">
        <button type="submit" class="btn-update">Guardar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>País</th>
                <th>Precio</th>
                <th>Cupos</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for viaje in viajes %}
            <tr>
                <td><input type="text" name="nombre_destino" value="{{ viaje.nombre_destino }}" class="table-input" form="form_actualizar_{{ viaje.id_destino }}"></td>
                <td><input type="text" name="pais" value="{{ viaje.pais }}" class="table-input" form="form_actualizar_{{ viaje.id_destino }}"></td>
                <td><input type="number" step="0.01" name="precio" value="{{ viaje.precio }}" class="table-input" form="form_actualizar_{{ viaje.id_destino }}"></td>
                <td><input type="number" name="cupos" value="{{ viaje.cupos }}" class="table-input" form="form_actualizar_{{ viaje.id_destino }}"></td>
                <td>
                    <form id="form_actualizar_{{ viaje.id_destino }}" action="/actualizar/{{ viaje.id_destino }}" method="POST" style="display:inline;">
                        <button type="submit" class="btn-update">Actualizar</button>
                    </form>
                    <a href="/eliminar/{{ viaje.id_destino }}" class="btn-delete" onclick="return confirm('¿Estás seguro de eliminar este destino?')">Eliminar</a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" style="text-align: center; padding: 20px;">No hay destinos registrados en la base de datos.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="footer-note">
        <p>Base de Datos MySQL | Proyecto Flask</p>
    </div>
</div>

</body>
</html>
