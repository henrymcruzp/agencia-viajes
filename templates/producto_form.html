{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; padding: 20px;">
    <h2>Añadir Nuevo Producto 📦</h2>
    <p>Ingresa los datos para guardarlos en SQLite, TXT, JSON y CSV al mismo tiempo.</p>

    <form method="POST" action="{{ url_for('nuevo_producto') }}" style="display: flex; flex-direction: column; gap: 15px;">
        
        <div>
            <label style="font-weight: bold;">Nombre del Producto:</label><br>
            <input type="text" name="nombre" required style="width: 100%; padding: 8px;">
        </div>
        
        <div>
            <label style="font-weight: bold;">Precio ($):</label><br>
            <input type="number" step="0.01" name="precio" required style="width: 100%; padding: 8px;">
        </div>
        
        <div>
            <label style="font-weight: bold;">Cantidad en Stock:</label><br>
            <input type="number" name="cantidad" required style="width: 100%; padding: 8px;">
        </div>
        
        <button type="submit" style="background-color: #007BFF; color: white; padding: 10px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;">
            Guardar Datos
        </button>
    </form>
</div>
{% endblock %}
