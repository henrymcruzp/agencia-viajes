<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia de Viajes - PREYECTO FINAL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>✈️ Agencia de Viajes (Semana 16)</h1>
        <nav>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('index') }}">Mis Destinos</a>
                <span style="color: white; margin-left: 20px;">Hola, {{ current_user.nombre }}</span>
                <a href="{{ url_for('logout') }}" style="color: #ff4d4d; margin-left: 15px;">Cerrar Sesión</a>
            {% else %}
                <a href="{{ url_for('login') }}">Iniciar Sesión</a>
                <a href="{{ url_for('registro') }}">Registrarse</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Tarea Semana 16 - Autenticación de Usuarios</p>
    </footer>
</body>
</html>
